<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        .header { background: #0A2540; color: #fff; padding: 14px 24px; }
        .header a { color: #fff; text-decoration: none; font-size: 14px; }
        .container { max-width: 420px; margin: 40px auto; padding: 0 16px; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 24px; }
        h1 { font-size: 20px; margin-bottom: 4px; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; border: none; background: none; font-size: 14px; font-weight: bold; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { color: #F05A22; border-bottom-color: #F05A22; }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: #F05A22; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-primary { background: #F05A22; color: #fff; }
        .btn-primary:hover { background: #d44d1a; }
        .error { background: #f8d7da; color: #721c24; padding: 10px; border: 1px solid #f5c6cb; border-radius: 4px; margin-bottom: 14px; font-size: 13px; display: none; }
        .error.show { display: block; }
        .success { background: #d4edda; color: #155724; padding: 10px; border: 1px solid #c3e6cb; border-radius: 4px; margin-bottom: 14px; font-size: 13px; display: none; }
        .success.show { display: block; }
        .help { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
        .help a { color: #F05A22; text-decoration: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html">BN-Infrastructure</a>
    <a href="index.html" style="float:right;">Cart</a>
</div>

<div class="container">
    <div class="card">
        <h1>Welcome</h1>
        <p class="subtitle">Sign in or create a new account</p>

        <div class="tabs">
            <button class="tab active" onclick="showTab('signin')">Sign In</button>
            <button class="tab" onclick="showTab('register')">Register</button>
        </div>

        <div class="panel active" id="signin">
            <div class="error" id="signinError"></div>
            <div class="success" id="signinSuccess"></div>

            <form onsubmit="doSignIn(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="siEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="siPass" required placeholder="Your password">
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            <div class="help">No account? <a onclick="showTab('register')">Register</a></div>
        </div>

        <div class="panel" id="register">
            <div class="error" id="regError"></div>
            <div class="success" id="regSuccess"></div>

            <form onsubmit="doRegister(event)">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="regName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="regEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password * (min 8 chars)</label>
                    <input type="password" id="regPass" required minlength="8" placeholder="Min 8 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="regConfirm" required placeholder="Re-enter password">
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            <div class="help">Have an account? <a onclick="showTab('signin')">Sign In</a></div>
        </div>
    </div>
</div>

<script>
function showTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById(tab).classList.add('active');
    document.querySelectorAll('.tab')[tab === 'signin' ? 0 : 1].classList.add('active');
}

function getUsers() { return JSON.parse(localStorage.getItem('users') || '[]'); }
function saveUsers(u) { localStorage.setItem('users', JSON.stringify(u)); }

function showError(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
}
function hideError(id) { document.getElementById(id).classList.remove('show'); }

function doSignIn(e) {
    e.preventDefault();
    hideError('signinError');
    var email = document.getElementById('siEmail').value.trim();
    var pass = document.getElementById('siPass').value;
    var users = getUsers();
    var user = users.find(function(u) { return u.email === email && u.password === pass; });
    if (user) {
        localStorage.setItem('loggedIn', JSON.stringify({ name: user.name, email: user.email }));
        alert('Login successful! Welcome, ' + user.name);
        window.location.href = 'index.html';
    } else {
        showError('signinError', 'Invalid email or password.');
    }
}

function doRegister(e) {
    e.preventDefault();
    hideError('regError');
    var name = document.getElementById('regName').value.trim();
    var email = document.getElementById('regEmail').value.trim();
    var pass = document.getElementById('regPass').value;
    var confirm = document.getElementById('regConfirm').value;

    if (pass !== confirm) { showError('regError', 'Passwords do not match.'); return; }

    var users = getUsers();
    var exists = users.find(function(u) { return u.email === email; });
    if (exists) { showError('regError', 'Email already registered.'); return; }

    users.push({ name: name, email: email, password: pass });
    saveUsers(users);
    document.getElementById('regSuccess').textContent = 'Account created! You can now sign in.';
    document.getElementById('regSuccess').classList.add('show');
    document.getElementById('regError').classList.remove('show');
    showTab('signin');
}
</script>
</body>
</html>
